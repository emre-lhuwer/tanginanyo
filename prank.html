<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para sa inyo 💀</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated bg gradient */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #3a0000 0%, #111 70%);
      z-index: 0;
      animation: bgPulse 2s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Flying emoji background */
    .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .floater {
      position: absolute;
      font-size: 1.8rem;
      opacity: 0.12;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      from { transform: translateY(110vh); }
      to   { transform: translateY(-10vh); }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 32px 24px;
    }

    /* Finger SVG */
    .finger-wrap {
      width: 160px;
      height: 220px;
      margin: 0 auto 24px;
      animation: shake 0.4s ease-in-out infinite;
      filter: drop-shadow(0 0 32px rgba(255,60,60,0.7));
    }
    @keyframes shake {
      0%   { transform: rotate(-6deg) translateY(0px); }
      25%  { transform: rotate(6deg) translateY(-6px); }
      50%  { transform: rotate(-4deg) translateY(0px); }
      75%  { transform: rotate(4deg) translateY(-4px); }
      100% { transform: rotate(-6deg) translateY(0px); }
    }

    /* Main text */
    .main-text {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      color: #FF3C3C;
      letter-spacing: 4px;
      line-height: 1;
      text-shadow:
        0 0 20px rgba(255,60,60,0.8),
        0 0 60px rgba(255,60,60,0.4),
        4px 4px 0px #7a0000;
      animation: flicker 3s ease-in-out infinite;
      margin-bottom: 12px;
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.7; }
      97%            { opacity: 1; }
      98%            { opacity: 0.5; }
      99%            { opacity: 1; }
    }

    .sub-text {
      font-size: clamp(1rem, 4vw, 1.4rem);
      color: rgba(255,255,255,0.6);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* Tag chips */
    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .tag {
      background: rgba(255,60,60,0.15);
      border: 1.5px solid rgba(255,60,60,0.4);
      color: #FF8080;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 5px 14px;
      border-radius: 999px;
      letter-spacing: 0.5px;
    }

    /* Bounce button */
    .btn {
      display: inline-block;
      background: #FF3C3C;
      color: white;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem;
      letter-spacing: 2px;
      padding: 14px 36px;
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 24px rgba(255,60,60,0.5);
      animation: btnBounce 1.5s ease-in-out infinite;
      transition: transform 0.15s;
    }
    .btn:hover { transform: scale(1.08); }
    @keyframes btnBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a0000;
      border: 2px solid #FF3C3C;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 0 60px rgba(255,60,60,0.4);
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .modal h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      color: #FF3C3C;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    .modal p {
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .modal-close {
      background: #FF3C3C;
      color: white;
      border: none;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      letter-spacing: 1px;
      padding: 10px 28px;
      border-radius: 999px;
      cursor: pointer;
    }

    .footer {
      position: relative;
      z-index: 2;
      margin-top: 20px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="floaters" id="floaters"></div>

  <div class="content">
    <!-- Middle finger SVG -->
    <div class="finger-wrap">
      <svg viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg" width="160" height="220">
        <!-- Palm -->
        <rect x="30" y="120" width="100" height="90" rx="18" fill="#FDBCB4"/>
        <!-- Pinky -->
        <rect x="32" y="90" width="22" height="52" rx="11" fill="#FDBCB4"/>
        <!-- Ring finger -->
        <rect x="58" y="78" width="22" height="64" rx="11" fill="#FDBCB4"/>
        <!-- Middle finger (tallest) -->
        <rect x="69" y="20" width="22" height="110" rx="11" fill="#FDBCB4"/>
        <!-- Knuckle lines middle -->
        <line x1="72" y1="105" x2="88" y2="105" stroke="#e8a090" stroke-width="2" stroke-linecap="round"/>
        <line x1="72" y1="118" x2="88" y2="118" stroke="#e8a090" stroke-width="2" stroke-linecap="round"/>
        <!-- Index finger -->
        <rect x="96" y="78" width="22" height="64" rx="11" fill="#FDBCB4"/>
        <!-- Thumb -->
        <rect x="18" y="130" width="20" height="52" rx="10" fill="#FDBCB4" transform="rotate(-18 18 130)"/>
        <!-- Nail middle finger -->
        <rect x="72" y="24" width="16" height="22" rx="7" fill="#f5a0a0"/>
        <!-- Nail shine -->
        <rect x="74" y="27" width="6" height="8" rx="3" fill="rgba(255,255,255,0.35)"/>
        <!-- Palm lines -->
        <path d="M45 155 Q80 145 115 155" stroke="#e8a090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M40 168 Q80 158 120 168" stroke="#e8a090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="main-text">PUTANGINANYO</div>
    <div class="sub-text">— para sa inyong lahat 💀</div>

    <div class="tags">
      <span class="tag">🤝 with love</span>
      <span class="tag">😤 puro ka drama</span>
      <span class="tag">💀 pero mahal kita</span>
    </div>

    <button class="btn" onclick="document.getElementById('modal').classList.add('show')">
      Alamin kung sino to 👀
    </button>
  </div>

  <p class="footer">JOKE LANG — FRIENDS FOREVER 💀❤️</p>

  <!-- Modal reveal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>HAHA NAKITA MO NA 😭</h2>
      <p>Alam mo naman na mahal kita noh? <br>Joke lang 'yun. <br><br>...o sige, bahagya lang. 💀</p>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">SIGE NA 😭</button>
    </div>
  </div>

  <script>
    const emojis = ['💀','😭','🖕','😤','💢','🔥','😂'];
    const fl = document.getElementById('floaters');
    for (let i = 0; i < 20; i++) {
      const d = document.createElement('div');
      d.className = 'floater';
      d.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      d.style.left = Math.random() * 100 + 'vw';
      d.style.fontSize = (1 + Math.random() * 2) + 'rem';
      d.style.animationDuration = (6 + Math.random() * 10) + 's';
      d.style.animationDelay = (Math.random() * 10) + 's';
      fl.appendChild(d);
    }
  </script>
</body>
</html>
